<div class="container mt-4">
  <div class="card shadow-sm p-4 mb-4">
    <h4 class="mb-3">Store Manager</h4>
    <div class="row g-3">
      <div class="col-md-8">
        <label class="form-label">Category Focus</label>
        <input type="text" class="form-control" placeholder="Enter Category (e.g. Electronics, Fashion)" [(ngModel)]="store.categoryFocus">
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <button class="btn btn-secondary w-100" (click)="createStore()" 
                [disabled]="!store.categoryFocus || profileStatus !== 'Approved'">
          ➕ Add Store Attributes
        </button>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
      <span>Stores List</span>
      <span *ngIf="profileStatus" class="badge rounded-pill bg-info text-dark">Profile: {{ profileStatus }}</span>
    </div>
    <div class="table-responsive">
      <table class="table table-hover mb-0 text-center">
        <thead class="table-light">
          <tr>
            <th class="text-start">Category Focus</th>
            <th>Quality Tier (Rating)</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let s of stores">
            <td class="text-start">{{ s.categoryFocus }}</td>
            <td><strong>{{ s.rating | number:'1.1-1' }}</strong> ⭐</td>
            <td>
              <span [class]="s.status === 'Active' ? 'badge bg-success' : 'badge bg-warning text-dark'">
                {{ s.status }}
              </span>
            </td>
            <td>
              <button class="btn btn-link btn-sm text-decoration-none me-3" (click)="toggleStatus(s)" [disabled]="s.status === 'Pending'">🔄 Toggle</button>
              <button class="btn btn-link btn-sm text-danger text-decoration-none" (click)="deleteStore(s)" [disabled]="s.status === 'Pending'">🗑️ Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
