<div class="container mt-4">

  <!-- Create Store -->
  <div class="card shadow-sm p-4">
    <h4 class="mb-3 text-dark">Store Manager</h4>

    <div class="row g-3">
      <div class="col-md-6">
        <input
          type="text"
          class="form-control"
          placeholder="Category Focus"
          [(ngModel)]="store.CategoryFocus"
        />
      </div>

      <div class="col-md-6">
        <input
          type="number"
          class="form-control"
          placeholder="Rating"
          step="0.1"
          [(ngModel)]="store.Rating"
        />
      </div>

      <div class="col-md-6">
        <select class="form-select" [(ngModel)]="store.Status">
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>

      <div class="col-12">
        <button class="btn btn-dark w-100" (click)="createStore()">
          ➕ Create Store
        </button>
      </div>
    </div>
  </div>

  <!-- Store List -->
  <div class="card shadow-sm mt-4">
    <div class="card-header bg-dark text-white">
      Stores List
    </div>

    <table class="table table-bordered table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>Category Focus</th>
          <th>Rating</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let store of stores">
          <td>{{ store.CategoryFocus }}</td>
          <td>{{ store.Rating }}</td>
          <td>{{ store.Status }}</td>
        </tr>

        <tr *ngIf="stores.length === 0">
          <td colspan="3" class="text-center text-muted">
            No stores found
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
