<div *ngIf="!setupMode">
  <div class="container-fluid pt-4">
    <div class="row mb-4">
      <div class="col">
        <h2 class="h4 border-bottom pb-2 fw-bold text-dark">Seller Performance Overview</h2>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-md-4">
        <div class="card shadow-sm border-0 border-start border-primary border-4 h-100">
          <div class="card-body">
            <div class="d-flex align-items-center">
              <div class="flex-shrink-0 bg-primary bg-opacity-10 text-primary p-3 rounded-circle">
                <i class="bi bi-currency-rupee fs-2"></i>
              </div>
              <div class="flex-grow-1 ms-3">
                <p class="text-muted mb-0 small text-uppercase fw-bold">Total Revenue (Net)</p>
                <h3 class="mb-0 fw-bold">{{ revenue | number:'1.2-2' }}</h3>
                <small class="text-danger" style="font-size: 0.7rem;">*Commission deducted</small>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card shadow-sm border-0 border-start border-warning border-4 h-100" [routerLink]="['../orders']" style="cursor: pointer;">
          <div class="card-body">
            <div class="d-flex align-items-center">
              <div class="flex-shrink-0 bg-warning bg-opacity-10 text-warning p-3 rounded-circle">
                <i class="bi bi-cart-check fs-2"></i>
              </div>
              <div class="flex-grow-1 ms-3">
                <p class="text-muted mb-0 small text-uppercase fw-bold">Total Orders</p>
                <div class="d-flex justify-content-between align-items-center">
                   <h3 class="mb-0 fw-bold">{{ totalOrders }}</h3>
                   <span class="text-warning small">View <i class="bi bi-arrow-right"></i></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card shadow-sm border-0 border-start border-info border-4 h-100" [routerLink]="['../inventory']" style="cursor: pointer;">
          <div class="card-body">
            <div class="d-flex align-items-center">
              <div class="flex-shrink-0 bg-info bg-opacity-10 text-info p-3 rounded-circle">
                <i class="bi bi-box-seam fs-2"></i>
              </div>
              <div class="flex-grow-1 ms-3">
                <p class="text-muted mb-1 small text-uppercase fw-bold">Inventory</p>
                <div class="text-info fw-semibold">
                  Click to view details <i class="bi bi-arrow-right-short fs-5"></i>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card shadow-sm border-0 border-start border-success border-4 h-100" [routerLink]="['../products']" style="cursor: pointer;">
          <div class="card-body">
            <div class="d-flex align-items-center">
              <div class="flex-shrink-0 bg-success bg-opacity-10 text-success p-3 rounded-circle">
                <i class="bi bi-box fs-2"></i>
              </div>
              <div class="flex-grow-1 ms-3">
                <p class="text-muted mb-1 small text-uppercase fw-bold">Products</p>
                <div class="text-success fw-semibold">
                  Click to view details <i class="bi bi-arrow-right-short fs-5"></i>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card shadow-sm border-0 border-start border-danger border-4 h-100" [routerLink]="['../stores']" style="cursor: pointer;">
          <div class="card-body">
            <div class="d-flex align-items-center">
              <div class="flex-shrink-0 bg-danger bg-opacity-10 text-danger p-3 rounded-circle">
                <i class="bi bi-shop fs-2"></i>
              </div>
              <div class="flex-grow-1 ms-3">
                <p class="text-muted mb-1 small text-uppercase fw-bold">Stores</p>
                <div class="text-danger fw-semibold">
                  Click to view details <i class="bi bi-arrow-right-short fs-5"></i>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card shadow-sm border-0 border-start border-dark border-4 h-100" [routerLink]="['../profile']" style="cursor: pointer;">
          <div class="card-body">
            <div class="d-flex align-items-center">
              <div class="flex-shrink-0 bg-dark bg-opacity-10 text-dark p-3 rounded-circle">
                <i class="bi bi-person-circle fs-2"></i>
              </div>
              <div class="flex-grow-1 ms-3">
                <p class="text-muted mb-0 small text-uppercase fw-bold">Seller Name</p>
                <h4 class="mb-0 fw-bold">{{ myProfile.storeName || 'My Profile' }}</h4>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
