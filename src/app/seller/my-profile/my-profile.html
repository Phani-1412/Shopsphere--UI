<div class="card p-3">
  <h3 style="text-align: center;">My Profile</h3>
  <div style="padding: 20px; border: 1px solid rgb(212, 209, 209); border-radius: 10px; width: 80%; margin: auto;">
      
      <h5 style="padding-top: 15px;">Seller ID:  {{ user.sellerId }}</h5>
      <h5 style="padding-top: 15px;">Store Name:  {{ user.storeName }}</h5>
      <h5 style="padding-top: 15px;">Compliance Status:  {{ user.complianceStatus }}</h5>
      
      <h5 *ngIf="user.rejectionReason" style="padding-top: 15px; color: red;">
        Reason: {{ user.rejectionReason }}
      </h5>
  </div>
</div>
