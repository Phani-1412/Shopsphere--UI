<div class="container mt-4">
  <div *ngIf="actionMsg" class="alert alert-success py-2 shadow-sm border-0">{{ actionMsg }}</div>
  <div *ngIf="errorMsg" class="alert alert-danger py-2 shadow-sm border-0">{{ errorMsg }}</div>

  <div class="card shadow-sm border-0">
    <div class="card-header bg-dark text-white p-3">
      <h5 class="mb-0"><i class="bi bi-box-seam me-2"></i>Inventory Manager</h5>
    </div>
    <div class="card-body p-4">
      <div class="row g-3">
        <div class="col-md-12">
          <label class="form-label small text-muted fw-bold">Select Product</label>
          <select class="form-select form-select-lg" [(ngModel)]="inventory.ProductID" (change)="getInventory()">
            <option [ngValue]="null" disabled>-- Choose a product to manage --</option>
            <option *ngFor="let p of myProducts" [ngValue]="p.productID || p.productId || p.id">
              {{ p.name || p.Name }} (SKU: {{ p.sku || p.SKU }})
            </option>
          </select>
        </div>
        
        <div class="col-md-6">
          <label class="form-label small text-muted fw-bold">Stock Quantity</label>
          <input type="number" [(ngModel)]="inventory.AvailableQuantity" class="form-control" placeholder="0">
        </div>

        <div class="col-md-6">
          <label class="form-label small text-muted fw-bold">Reorder Level</label>
          <input type="number" [(ngModel)]="inventory.ReorderThreshold" class="form-control" placeholder="5">
        </div>

        <div class="col-12 mt-3">
          <button class="btn btn-primary w-100 py-2 fw-bold" (click)="CreateOrUpdate()" [disabled]="!inventory.ProductID">
            Save Inventory Changes
          </button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="result" class="card shadow-sm mt-4 border-0">
    <div class="card-header bg-light border-0 py-3">
      <span class="text-uppercase small fw-bold text-muted">Current Stock Status</span>
    </div>
    <div class="card-body">
      <div class="row text-center">
        <div class="col-6 border-end">
          <div class="text-muted small">Available</div>
          <div class="fw-bold fs-3 text-primary">
            {{ result.availableQuantity ?? result.AvailableQuantity ?? 0 }}
          </div>
        </div>
        <div class="col-6">
          <div class="text-muted small">Threshold</div>
          <div class="fw-bold fs-3" 
               [class.text-danger]="(result.availableQuantity ?? result.AvailableQuantity) <= (result.reorderThreshold ?? result.ReorderThreshold)"
               [class.text-success]="(result.availableQuantity ?? result.AvailableQuantity) > (result.reorderThreshold ?? result.ReorderThreshold)">
            {{ result.reorderThreshold ?? result.ReorderThreshold ?? 0 }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
