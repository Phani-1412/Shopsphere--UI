<div class="container mt-4">
  <div *ngIf="actionMsg" class="alert alert-success py-2 shadow-sm">{{ actionMsg }}</div>
  <div *ngIf="errorMsg" class="alert alert-danger py-2 shadow-sm">{{ errorMsg }}</div>

  <div class="card shadow-sm">
    <div class="card-header bg-dark text-white">
      <h5 class="mb-0">Inventory Manager</h5>
    </div>
    <div class="card-body p-4">
      <div class="row g-3">
        <div class="col-md-12">
          <label class="form-label small text-muted">Product ID</label>
          <input type="number" min="0" [(ngModel)]="inventory.ProductID" class="form-control">
        </div>
        
        <div class="col-md-6">
          <label class="form-label small text-muted">Available Quantity</label>
          <input type="number" min="0" [(ngModel)]="inventory.AvailableQuantity" class="form-control">
        </div>

        <div class="col-md-6">
          <label class="form-label small text-muted">Reorder Threshold</label>
          <input type="number" min="0" [(ngModel)]="inventory.ReorderThreshold" class="form-control">
        </div>

        <div class="col-12 d-flex gap-2 mt-3">
          <button class="btn btn-primary flex-grow-1" (click)="CreateOrUpdate()">Save Inventory</button>
          <button class="btn btn-outline-success" (click)="getInventory()">Get Inventory</button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="result" class="card shadow-sm mt-4 border-success animate__animated animate__fadeIn">
    <div class="card-header bg-success text-white small fw-bold">Current Stock Level</div>
    <div class="card-body">
      <div class="row text-center">
        <div class="col-4 border-end">
          <div class="text-muted small">Product ID</div>
          <div class="fw-bold fs-5">#{{result.productID || result.ProductID}}</div>
        </div>
        <div class="col-4 border-end">
          <div class="text-muted small">Available</div>
          <div class="fw-bold fs-5 text-primary">{{result.availableQuantity || result.AvailableQuantity}}</div>
        </div>
        <div class="col-4">
          <div class="text-muted small">Threshold</div>
          <div class="fw-bold fs-5 text-danger">{{result.reorderThreshold || result.ReorderThreshold}}</div>
        </div>
      </div>
    </div>
  </div>
</div>
