<div *ngIf="actionMsg" class="state-msg success">{{ actionMsg }}</div>
<div *ngIf="loading" class="state-msg">Loading...</div>
 
<div *ngIf="!loading">
  <div class="stat-card" style="margin-bottom:20px;">
    <div class="stat-icon">💰</div>
    <div class="stat-value" *ngIf="current">{{ current.percentage }}%</div>
    <div class="stat-value" *ngIf="!current">Not set</div>
    <div class="stat-label">Current Commission Rate</div>
  </div>
 
  <button class="btn btn-approve" (click)="showForm = !showForm">
    {{ showForm ? 'Cancel' : (current ? '✏️ Update Commission' : '+ Set Commission') }}
  </button>
 
  <div class="form-card" *ngIf="showForm" style="margin-top:16px;">
    <div class="form-group">
      <label class="form-label">New Commission Percentage (%)</label>
      <input class="form-input" type="number" min="0" max="100" step="0.5" [(ngModel)]="newPercentage" placeholder="e.g. 5.5" />
    </div>
    <button class="btn btn-approve" (click)="submit()">Save</button>
  </div>
</div>
