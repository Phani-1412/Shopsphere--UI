<div class="layout-wrapper">
 
  <aside class="left-sidebar">
    <div class="brand">
      <span class="brand-icon">🛍️</span>
      <span class="brand-name">ShopSphere</span>
      <span class="brand-sub">Admin Panel</span>
    </div>
    <nav class="nav-menu">
      <div class="nav-group" *ngFor="let group of menuGroups">
        <span class="nav-group-label">{{ group.label }}</span>
        <button
          *ngFor="let key of group.keys"
          class="nav-item"
          [class.active]="activePanel === key"
          (click)="openPanel(key)">
          <span class="nav-icon">{{ getCard(key).icon }}</span>
          <span>{{ getCard(key).label }}</span>
        </button>
      </div>
    </nav>
    <button class="logout-btn" (click)="logout()">
      <span>🚪</span> Logout
    </button>
  </aside>
 
  <main class="main-content">
    <header class="page-header">
      <h1 class="page-title">Admin Dashboard</h1>
      <p class="page-subtitle">Select an action to get started</p>
    </header>
    <div class="cards-grid">
      <div
        *ngFor="let card of cards"
        class="action-card"
        [class.active]="activePanel === card.key"
        (click)="openPanel(card.key)">
        <div class="card-icon">{{ card.icon }}</div>
        <div class="card-label">{{ card.label }}</div>
        <div class="card-desc">{{ card.description }}</div>
        <div class="card-arrow">→</div>
      </div>
    </div>
  </main>
 
  <aside class="right-panel" [class.open]="activePanel !== null">
    <div class="panel-header">
      <h2 class="panel-title">
        <span *ngIf="activePanel">
          {{ getCard(activePanel).icon }}
          {{ getCard(activePanel).label }}
        </span>
      </h2>
      <button class="close-btn" (click)="closePanel()">✕</button>
    </div>
    <div class="panel-body">
      <app-analytics   *ngIf="activePanel === 'analytics'"></app-analytics>
      <app-sellers     *ngIf="activePanel === 'sellers'"></app-sellers>
      <app-orders      *ngIf="activePanel === 'orders'"></app-orders>
      <app-disputes    *ngIf="activePanel === 'disputes'"></app-disputes>
      <app-returns     *ngIf="activePanel === 'returns'"></app-returns>
      <app-categories  *ngIf="activePanel === 'categories'"></app-categories>
      <app-policies    *ngIf="activePanel === 'policies'"></app-policies>
      <app-commission  *ngIf="activePanel === 'commission'"></app-commission>
    </div>
  </aside>
 
</div>
