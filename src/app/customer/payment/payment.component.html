<!-- <p>payment works!</p> -->
<p class="section-label">Make a Payment</p>
 
<div *ngIf="successMsg" class="state-msg success">{{ successMsg }}</div>
<div *ngIf="errorMsg"   class="state-msg error">{{ errorMsg }}</div>
 
<div class="form-card">
  <div class="form-group">
    <label class="form-label">Order ID</label>
    <input class="form-input" type="number" [(ngModel)]="orderId" placeholder="e.g. 42" min="1" />
  </div>
 
  <div class="form-group">
    <label class="form-label">Amount (₹)</label>
    <input class="form-input" type="number" [(ngModel)]="amount" placeholder="e.g. 1299.00" min="1" step="0.01" />
  </div>
 
  <div class="form-group">
    <label class="form-label">Payment Method</label>
    <select class="form-input" [(ngModel)]="method">
      <option *ngFor="let m of methods" [value]="m">{{ m }}</option>
    </select>
  </div>
 
  <button
    class="btn btn-primary"
    style="width: 100%; padding: 12px;"
    [disabled]="loading"
    (click)="submit()">
    {{ loading ? 'Processing...' : '💳 Pay Now' }}
  </button>
</div>
 
<div class="item-card" style="background:#f0f9ff; border-color:#bae6fd; margin-top: 8px;">
  <div class="item-sub">💡 <strong>Tip:</strong> Find your Order ID in the <strong>Order Details</strong> section above.</div>
</div>
