<div class="auth-wrapper">
  <div class="card-container" [class.flipped]="isFlipped">
    <p *ngIf="successMessage" style="color:green text-align= center">{{ successMessage }}</p>
    <p *ngIf="errorMessage" style="color:red text-align= center">{{ errorMessage }}</p>
 
    <div class="card-face card-front">
      <h3>Login</h3>
 
      <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)">
 
        <input
          type="email"
          name="email"
          ngModel
          placeholder="Email"
          class="form-control mb-2"
          required
        >
 
        <input
          type="password"
          name="password"
          ngModel
          placeholder="Password"
          class="form-control mb-3"
          required
        >
 
        <button
          class="btn btn-primary w-100"
          [disabled]="loginForm.invalid"
        >
          Sign In
        </button>
 
      </form>
 
      <p class="mt-3">
        New here?
        <span class="toggle-link" (click)="toggleCard()">
          Register Now
        </span>
      </p>
    </div>
 
    <!-- REGISTER SIDE -->
    <div class="card-face card-back">
      <h3>Register</h3>
 
      <form #registerForm="ngForm" (ngSubmit)="onRegister(registerForm)">
 
        <input
          type="text"
          name="name"
          ngModel
          placeholder="Enter Name"
          class="form-control mb-2"
          required
        >
 
        <select
  name="role"
  ngModel
  class="form-control mb-2"
  required
>
  <option value="" disabled selected>Select Role</option>
  <option value="Admin">Admin</option>
  <option value="Seller">Seller</option>
  <option value="Customer">Customer</option>
  <option value="Logistics">Logistics</option>
</select>
 
 
        <input
          type="email"
          name="email"
          ngModel
          placeholder="Email"
          class="form-control mb-2"
          required
        >
 
        <input
          type="text"
          name="phone"
          ngModel
          placeholder="Phone Number"
          class="form-control mb-2"
          required
        >
 
        <input
          type="password"
          name="password"
          ngModel
          placeholder="Password"
          class="form-control mb-3"
          required
          minlength="6"
        >
 
        <button
          class="btn btn-success w-100"
          [disabled]="registerForm.invalid"
        >
          Create Account
        </button>
 
      </form>
 
      <p class="mt-3">
        Already a member?
        <span class="toggle-link" (click)="toggleCard()">
          Login
        </span>
      </p>
    </div>
 
  </div>
</div>
 <router-outlet></router-outlet>
